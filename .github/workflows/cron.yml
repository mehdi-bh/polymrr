name: Cron Jobs
run-name: "${{ github.event_name == 'workflow_dispatch' && inputs.job || github.event.schedule == '*/30 * * * *' && 'sync-frequent' || github.event.schedule == '0 2 * * *' && 'sync-daily' || github.event.schedule == '0 4 * * *' && 'generate-markets' || github.event.schedule == '0 0 * * *' && 'resolve-markets' || 'Cron Jobs' }}"

on:
  schedule:
    - cron: "*/30 * * * *" # sync-frequent
    - cron: "0 2 * * *"    # sync-daily
    - cron: "0 4 * * *"    # generate-markets
    - cron: "0 0 * * *"    # resolve-markets
  workflow_dispatch:
    inputs:
      job:
        description: "Job to run"
        required: true
        type: choice
        options:
          - sync-daily
          - sync-frequent
          - scrape-mrr
          - scrape-mrr-new
          - sync-startups
          - generate-markets
          - resolve-markets
          - sync-followers

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
  TRUSTMRR_API_KEY: ${{ secrets.TRUSTMRR_API_KEY }}

jobs:
  sync-frequent:
    if: github.event.schedule == '*/30 * * * *' || (github.event_name == 'workflow_dispatch' && inputs.job == 'sync-frequent')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx tsx scripts/sync-frequent.ts

  sync-daily:
    if: github.event.schedule == '0 2 * * *' || (github.event_name == 'workflow_dispatch' && inputs.job == 'sync-daily')
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx tsx scripts/sync-daily.ts

  scrape-mrr:
    if: github.event_name == 'workflow_dispatch' && inputs.job == 'scrape-mrr'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx tsx scripts/scrape-mrr.ts

  scrape-mrr-new:
    if: github.event_name == 'workflow_dispatch' && inputs.job == 'scrape-mrr-new'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx tsx scripts/scrape-mrr-new.ts

  generate-markets:
    if: github.event.schedule == '0 4 * * *' || (github.event_name == 'workflow_dispatch' && inputs.job == 'generate-markets')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx tsx scripts/generate-markets.ts

  resolve-markets:
    if: github.event.schedule == '0 0 * * *' || (github.event_name == 'workflow_dispatch' && inputs.job == 'resolve-markets')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx tsx scripts/resolve-markets.ts

  sync-startups:
    if: github.event_name == 'workflow_dispatch' && inputs.job == 'sync-startups'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx tsx scripts/sync-startups.ts

  sync-followers:
    if: github.event_name == 'workflow_dispatch' && inputs.job == 'sync-followers'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx tsx scripts/sync-followers.ts
